<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Student Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="login-page">
    <section class="login-card">
      <h1>Admin Login</h1>
      <p>Restricted Access - Admin Details Required</p>

      <form id="admin-login-form" novalidate>
        <div class="form-group">
          <label for="admin-id">Admin Username</label>
          <input type="text" id="admin-id" placeholder="username" required>
          <div class="form-error" id="admin-id-error"></div>
        </div>

        <div class="form-group password-wrapper">
          <label for="admin-password">Password</label>
          <div class="password-field">
            <input type="password" id="admin-password" placeholder="Enter password" required>
            <span id="toggle-admin-password" class="eye-icon">👁</span>
          </div>
          <div class="form-error" id="admin-password-error"></div>
        </div>

        <button type="submit" class="btn">Login</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
<div class="admin-login-link">
  <a href="login.html">Student Login</a>
</div>
</html>
