<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Supabase Enrollment System</h1>
    <button id="loadBtn">Load All Current Students</button>
    <button id="addBtn">Add New Student</button>
    <button id="clearBtn">Clear Output</button>

    <table id="enrolmentTable" aria-label="Enrollment table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="4" class="empty">No records loaded yet</td></tr>
      </tbody>
    </table>

    <div id="output">Output appears here</div>

    <script type="module">
      import { getAllRows, insertRow } from './enrol.js';

      const output = document.getElementById('output');
      const tableBody = document.querySelector('#enrolmentTable tbody');

      window.addEventListener('error', (event) => {
        const msg = `Runtime error: ${event.message} at ${event.filename}:${event.lineno}:${event.colno}`;
        console.error(msg);
        output.textContent += `\n${msg}`;
      });

      window.addEventListener('unhandledrejection', (event) => {
        const msg = `Unhandled promise rejection: ${event.reason?.message ?? event.reason}`;
        console.error(msg);
        output.textContent += `\n${msg}`;
      });

      function log(msg) {
        output.textContent += `${msg}\n`;
      }

      function renderTable(rows) {
        tableBody.innerHTML = '';

        if (!rows || rows.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4" class="empty">No records found</td></tr>';
          return;
        }

        rows.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id ?? row.student_number ?? ''}</td>
            <td>${row.name ?? ''}</td>
            <td>${row.email ?? ''}</td>
            <td>${row.created_at ?? ''}</td>
          `;
          tableBody.appendChild(tr);
        });
      }

      async function refreshAll() {
        output.textContent = 'Loading...\n';
        try {
          const rows = await getAllRows();
          renderTable(rows);
          output.textContent += `Loaded ${rows.length} row(s).\n`;
        } catch (err) {
          output.textContent += 'Error loading rows: ' + err.message + '\n';
        }
      }

      document.getElementById('loadBtn').addEventListener('click', () => refreshAll());

      document.getElementById('addBtn').addEventListener('click', async () => {
        output.textContent = 'Inserting sample row...\n';
        try {
          await insertRow({ name: 'Student ' + Date.now(), email: `student+${Date.now()}@example.com` });
          output.textContent += 'Inserted sample row.\n';
          await refreshAll();
        } catch (err) {
          output.textContent += 'Error inserting row: ' + err.message + '\n';
        }
      });

      document.getElementById('clearBtn').addEventListener('click', () => {
        output.textContent = '';
        tableBody.innerHTML = '<tr><td colspan="4" class="empty">No records loaded yet</td></tr>';
      });

      refreshAll();
    </script>
</body>
</html>
