<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Student Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <div class="login-container">
    <header class="login-header">
      <h1 class="brand-logo">Student Companion</h1>
      <p class="subtitle">Welcome back! Please enter your details.</p>
    </header>

    <main class="login-card">
      <form id="login-form">
        <div class="form-group">
          <label for="student-id">Student ID</label>
          <input type="text" id="student-id" placeholder="Enter your ID (e.g. SC000234)" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-utilities">
          <label class="checkbox-group">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>
    </main>

    <footer class="login-footer">
      <p>New here? <a href="#">Contact Registrar</a></p>
      <a href="index.html" class="back-home">← Back to Homepage</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
